<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Calculator</title>
    <style>
        /* CSS: This styles the calculator and makes it look modern */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f4f9;
            margin: 0;
            font-family: Arial, sans-serif;
        }

        .calculator {
            background-color: #333;
            border-radius: 10px;
            box-shadow: 0px 10px 20px rgba(0, 0, 0, 0.2);
            padding: 20px;
            width: 300px;
        }

        #display {
            width: 100%;
            height: 50px;
            background-color: #222;
            color: #fff;
            text-align: right;
            font-size: 2rem;
            border: none;
            border-radius: 5px;
            padding: 10px;
            box-sizing: border-box;
            margin-bottom: 20px;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        button {
            height: 60px;
            font-size: 1.5rem;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background-color: #eee;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #ddd;
        }

        button:active {
            background-color: #ccc;
        }

        .operator {
            background-color: #ff9500;
            color: white;
        }

        .operator:hover {
            background-color: #e08300;
        }

        .clear {
            background-color: #ff3b30;
            color: white;
            grid-column: span 2; /* Makes the clear button wider */
        }

        .clear:hover {
            background-color: #e0352b;
        }

        .equal {
            background-color: #34c759;
            color: white;
            grid-column: span 2; /* Makes the equals button wider */
        }

        .equal:hover {
            background-color: #2dae4e;
        }
    </style>
</head>
<body>

    <!-- HTML: This creates the structure of the calculator -->
    <div class="calculator">
        <input type="text" id="display" disabled>
        
        <div class="buttons">
            <button class="clear" onclick="clearDisplay()">C</button>
            <button class="operator" onclick="appendValue('/')">÷</button>
            <button class="operator" onclick="appendValue('*')">×</button>
            
            <button onclick="appendValue('7')">7</button>
            <button onclick="appendValue('8')">8</button>
            <button onclick="appendValue('9')">9</button>
            <button class="operator" onclick="appendValue('-')">−</button>
            
            <button onclick="appendValue('4')">4</button>
            <button onclick="appendValue('5')">5</button>
            <button onclick="appendValue('6')">6</button>
            <button class="operator" onclick="appendValue('+')">+</button>
            
            <button onclick="appendValue('1')">1</button>
            <button onclick="appendValue('2')">2</button>
            <button onclick="appendValue('3')">3</button>
            <button onclick="appendValue('.')">.</button>

            <button onclick="appendValue('0')">0</button>
            <button class="equal" onclick="calculate()">=</button>
        </div>
    </div>

    <!-- JavaScript: This makes the calculator function -->
    <script>
        const display = document.getElementById('display');

        // Adds the clicked number or operator to the screen
        function appendValue(value) {
            display.value += value;
        }

        // Clears the screen
        function clearDisplay() {
            display.value = '';
        }

        // Calculates the result
        function calculate() {
            try {
                // eval() evaluates the math expression inside the string
                display.value = eval(display.value);
            } catch (error) {
                // If the user types something invalid (like two ++), it shows Error
                display.value = 'Error';
            }
        }
    </script>
</body>
</html>
